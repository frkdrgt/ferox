name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows x64 (MSVC) ────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename artifact
        run: |
          copy target\x86_64-pc-windows-msvc\release\pgclient.exe pgclient-windows-x64.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pgclient-windows-x64.exe
          fail_on_unmatched_files: true

  # ── macOS Universal (x86_64 + arm64) ──────────────────────────────────────
  build-macos:
    name: macOS Universal
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/pgclient \
            target/aarch64-apple-darwin/release/pgclient \
            -output pgclient-universal

      - name: Strip version prefix from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create .app bundle
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP="pgclient.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp pgclient-universal "$APP/Contents/MacOS/pgclient"
          chmod +x "$APP/Contents/MacOS/pgclient"

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>pgclient</string>
            <key>CFBundleIdentifier</key>
            <string>com.pgclient.app</string>
            <key>CFBundleName</key>
            <string>pgclient</string>
            <key>CFBundleDisplayName</key>
            <string>pgclient</string>
            <key>CFBundleVersion</key>
            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key>
            <string>$VERSION</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "pgclient" \
            -srcfolder pgclient.app \
            -ov -format UDZO \
            pgclient-macos-universal.dmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pgclient-macos-universal.dmg
          fail_on_unmatched_files: true
