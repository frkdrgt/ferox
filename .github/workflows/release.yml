name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows x64 ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename
        run: copy target\x86_64-pc-windows-msvc\release\ferox.exe ferox-windows-x64.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: ferox-windows-x64.exe

  # ── macOS Universal (Intel + Apple Silicon) ──────────────────────────────────
  build-macos:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ hashFiles('Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/ferox \
            target/aarch64-apple-darwin/release/ferox \
            -output ferox-universal

      - name: Create .app bundle + DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="Ferox.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp ferox-universal "$APP/Contents/MacOS/ferox"
          chmod +x "$APP/Contents/MacOS/ferox"
          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>ferox</string>
            <key>CFBundleIdentifier</key><string>com.frkdrgt.ferox</string>
            <key>CFBundleName</key><string>Ferox</string>
            <key>CFBundleDisplayName</key><string>Ferox</string>
            <key>CFBundleVersion</key><string>$VERSION</string>
            <key>CFBundleShortVersionString</key><string>$VERSION</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict></plist>
          EOF
          hdiutil create \
            -volname "Ferox" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            ferox-macos-universal.dmg

      - uses: softprops/action-gh-release@v2
        with:
          files: ferox-macos-universal.dmg

  # ── Linux x64 ────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libpango1.0-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package tar.gz
        run: |
          cp target/x86_64-unknown-linux-gnu/release/ferox ferox
          tar -czf ferox-linux-x64.tar.gz ferox

      - uses: softprops/action-gh-release@v2
        with:
          files: ferox-linux-x64.tar.gz
